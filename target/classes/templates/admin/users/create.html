<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create User</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 720px; margin: 24px auto; }
        label { display:block; margin: 8px 0; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        .actions { margin-top: 12px; display:flex; gap:8px; }
        .error { color: #a80000; font-size: 0.9rem; }
    </style>
</head>
<body>
<h2>Create User</h2>
<form th:action="@{/admin/users}" th:object="${form}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <label>Username
        <input type="text" th:field="*{username}" required minlength="3" maxlength="100"/>
        <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">username error</div>
    </label>

    <label>Password
        <input type="password" th:field="*{password}" required minlength="8" maxlength="128"/>
        <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">password error</div>
    </label>

    <label>Role
        <select th:field="*{role}" required>
            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
        </select>
        <div class="error" th:if="${#fields.hasErrors('role')}" th:errors="*{role}">role error</div>
    </label>

    <div class="actions">
        <button type="submit">Create</button>
        <a th:href="@{/admin/users/list}">Cancel</a>
    </div>
</form>
