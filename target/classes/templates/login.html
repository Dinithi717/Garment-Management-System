<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; display:flex; height:100vh;
            align-items:center; justify-content:center; background:#f7f7f7; }
        .login-box { background:white; padding:24px; border-radius:8px;
            box-shadow:0 2px 6px rgba(0,0,0,0.2); width:300px; }
        h2 { margin-top:0; text-align:center; }
        label { display:block; margin:12px 0 6px; }
        input { width:100%; padding:8px; box-sizing:border-box; }
        button { margin-top:16px; width:100%; padding:10px; background:#0073e6;
            color:white; border:none; border-radius:4px; cursor:pointer; }
        button:hover { background:#005bb5; }
        .error { color:red; margin-top:10px; text-align:center; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Please Sign In</h2>
    <form th:action="@{/login}" method="post">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <button type="submit">Login</button>

        <div th:if="${param.error}" class="error">Invalid username or password</div>
        <div th:if="${param.logout}" class="error">You have been logged out</div>
    </form>
</div>
</body>
</html>
