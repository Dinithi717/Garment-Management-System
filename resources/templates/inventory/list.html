<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventory List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f8;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 900px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        .alert {
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        .alert-warning {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #007bff;
            color: white;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        tr.low-stock {
            background-color: #fff3cd;
        }
        .btn {
            display: inline-block;
            padding: 8px 12px;
            margin-top: 15px;
            font-size: 14px;
            border-radius: 4px;
            text-decoration: none;
            background-color: #28a745;
            color: white;
        }
        .btn:hover {
            background-color: #218838;
        }
        .action-btn {
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
            color: white;
            text-decoration: none;
            display: inline-block;
        }
        .edit-btn {
            background-color: #ffc107;
            border: none;
        }
        .edit-btn:hover {
            background-color: #e0a800;
        }
        .delete-btn {
            background-color: #dc3545;
            border: none;
        }
        .delete-btn:hover {
            background-color: #c82333;
        }
        .stock-warning {
            color: #dc3545;
            font-weight: bold;
        }
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Inventory Items</h2>

    <!-- Success/Error Messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- Low Stock Alert -->
    <div th:if="${!inventoryPage.isEmpty()}" class="alert alert-warning">
        <strong>⚠️ Low Stock Alert:</strong>
        <span th:if="${#lists.size(#lists.isEmpty(inventoryPage.content) ? {} : inventoryPage.content.?[quantity < 50])} > 0">
            <span th:text="${#lists.size(inventoryPage.content.?[quantity < 50])}"></span> item(s) have stock below 50!
        </span>
        <span th:if="${#lists.size(#lists.isEmpty(inventoryPage.content) ? {} : inventoryPage.content.?[quantity < 50])} == 0">
            All items have sufficient stock.
        </span>
    </div>

    <!-- Empty State -->
    <div th:if="${inventoryPage.isEmpty()}" class="empty-message">
        <p>No inventory items found. Start by adding a new item!</p>
    </div>

    <!-- Inventory Table -->
    <table th:if="${!inventoryPage.isEmpty()}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Item Name</th>
            <th>SKU</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Description</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${inventoryPage.content}"
            th:classappend="${item.quantity < 50} ? 'low-stock' : ''">
            <td th:text="${item.id}"></td>
            <td th:text="${item.itemName}"></td>
            <td th:text="${item.itemCode}"></td>
            <td>
                <span th:text="${item.quantity}"></span>
                <span th:if="${item.quantity < 50}" class="stock-warning"> ⚠️ LOW</span>
            </td>
            <td th:text="${'$' + #numbers.formatDecimal(item.unitPrice, 1, 2)}"></td>
            <td th:text="${item.description != null ? item.description : '-'}"></td>
            <td>
                <a th:href="@{/admin/inventory/edit/{id}(id=${item.id})}"
                   class="action-btn edit-btn">Edit</a>
                <form th:action="@{/admin/inventory/delete/{id}(id=${item.id})}"
                      method="post" style="display:inline;">
                    <button type="submit" class="action-btn delete-btn"
                            onclick="return confirm('Are you sure you want to delete this item?')">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/admin/inventory/create}" class="btn">+ Add New Item</a>
</div>
</body>
</html>
