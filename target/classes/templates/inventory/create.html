<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Inventory Item</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f8;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
            resize: vertical;
        }
        textarea {
            height: 80px;
        }
        .error {
            color: #dc3545;
            font-size: 12px;
            margin-bottom: 15px;
            display: block;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #0056b3;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #007bff;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Create Inventory Item</h2>
    <form th:action="@{/admin/inventory/create}" th:object="${createInventoryItemRequest}" method="post">
        <label for="itemName">Item Name</label>
        <input type="text" id="itemName" th:field="*{itemName}">
        <span class="error" th:if="${#fields.hasErrors('itemName')}" th:errors="*{itemName}"></span>

        <label for="itemCode">SKU Code</label>
        <input type="text" id="itemCode" th:field="*{itemCode}">
        <span class="error" th:if="${#fields.hasErrors('itemCode')}" th:errors="*{itemCode}"></span>

        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" th:field="*{quantity}" min="0">
        <span class="error" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></span>

        <label for="unitPrice">Unit Price</label>
        <input type="number" id="unitPrice" th:field="*{unitPrice}" step="0.01" min="0">
        <span class="error" th:if="${#fields.hasErrors('unitPrice')}" th:errors="*{unitPrice}"></span>

        <label for="description">Description</label>
        <textarea id="description" th:field="*{description}"></textarea>
        <span class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>

        <button type="submit">Create Item</button>
    </form>
    <a th:href="@{/admin/inventory/list}" class="back-link">← Back to Inventory List</a>
</div>
</body>
</html>
