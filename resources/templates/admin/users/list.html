<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin – Users</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 920px; margin: 24px auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { padding: 8px 10px; border-bottom: 1px solid #ddd; text-align: left; }
        .topbar { display: flex; justify-content: space-between; align-items: center; }
        .msg { background:#e7f6ec; color:#145a32; padding:8px 10px; border:1px solid #c8e6d0; border-radius:6px; }
        form.inline { display: inline-block; margin-right: 6px; }
        select, input[type=password] { padding: 4px 6px; }
        button { padding: 6px 10px; cursor: pointer; }
    </style>

    <style>
        .msg {
            background:#e7f6ec;
            color:#145a32;
            padding:8px 10px;
            border:1px solid #c8e6d0;
            border-radius:6px;
            transition: opacity 0.5s ease;
        }
    </style>

</head>
<body>
<div class="topbar">
    <h2>Users</h2>
    <a href="/admin/users/create"><button>Create User</button></a>
</div>

<div th:if="${msg}" class="msg" th:text="${msg}"></div>
<div th:if="${err}" class="msg" style="background:#fdecea;color:#611a15" th:text="${err}"></div>



<script>
    function confirmAction(message) {
        return confirm(message); // native browser confirmation dialog
    }

    // Optional: fade out success/error messages after a few seconds
    window.addEventListener('DOMContentLoaded', (event) => {
        const msgDiv = document.querySelector('.msg');
        if (msgDiv) {
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 4000); // 4 seconds
        }
    });
</script>

<table>
    <thead>
    <tr>
        <th>ID</th><th>Username</th><th>Active</th><th>Roles</th><th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="u : ${page.content}">
        <td th:text="${u.id}">1</td>
        <td th:text="${u.username}">alice</td>
        <td th:text="${u.active}">true</td>
        <td>
            <span th:each="r : ${u.roles}" th:text="${r.name}">ROLE_ADMIN</span>
        </td>
        <td>

            <form th:action="@{/admin/users/{id}/deactivate(id=${u.id})}" method="post" class="inline"
                  onsubmit="return confirmAction('Are you sure you want to deactivate this user?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit">Deactivate</button>
            </form>


            <form th:action="@{/admin/users/{id}/activate(id=${u.id})}" method="post" class="inline"
                  onsubmit="return confirmAction('Are you want to sure you want to active this user?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit">Activate</button>
            </form>


            <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post" class="inline"
            onsubmit="return confirmAction('Are you sure you want to delete this user?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit">Delete User</button>
            </form>



            <form th:action="@{'/admin/users/' + ${u.id} + '/assign-role'}" method="post" class="inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <select name="role" required>
                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                </select>
                <button type="submit">Assign Role</button>
            </form>


            <form th:action="@{'/admin/users/' + ${u.id} + '/reset-password'}" method="post" class="inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="password" name="newPassword" placeholder="New password" required />
                <button type="submit">Reset Password</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<div>
    <form th:if="${page.totalPages > 1}" method="get" action="/admin/users">
        <button th:if="${!page.first}" name="page" th:value="${page.number - 1}">Prev</button>
        <span>Page <span th:text="${page.number + 1}">1</span> of <span th:text="${page.totalPages}">1</span></span>
        <button th:if="${!page.last}" name="page" th:value="${page.number + 1}">Next</button>
    </form>
</div>
</body>
</html>
